name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  env-check:
    name: Validate Required Env Vars
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are configured
        run: |
          missing=()
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            missing+=("DATABASE_URL")
          fi
          if [ -z "${{ secrets.MONARCH_TOKEN }}" ]; then
            missing+=("MONARCH_TOKEN")
          fi
          if [ -z "${{ secrets.SYNC_API_KEY }}" ]; then
            missing+=("SYNC_API_KEY")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Configure these in GitHub repo Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "All required env vars are configured."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests (mocked)
        run: npx jest --ci --reporters=default --testPathIgnorePatterns='integration|e2e'
        env:
          CI: true

      - name: Integration tests (real DB)
        run: npx jest --ci --reporters=default --testPathPattern='integration'
        env:
          CI: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}

      - name: Monarch integration tests (real API)
        run: npm run test:monarch
        env:
          MONARCH_TOKEN: ${{ secrets.MONARCH_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: E2E dashboard rendering tests
        run: npm run test:e2e
        env:
          DASHBOARD_URL: https://ceo-mission-control-nine.vercel.app

      - name: Coverage report
        if: always()
        run: npx jest --coverage --ci --reporters=default --testPathIgnorePatterns='integration|e2e'
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%';
              console.log('Statements:', fmt(c.statements));
              console.log('Branches:  ', fmt(c.branches));
              console.log('Functions: ', fmt(c.functions));
              console.log('Lines:     ', fmt(c.lines));
            " >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [env-check, lint, type-check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

  # Playwright E2E: runs in a real browser against localhost
  # Validates client-side rendering on every PR and push
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start server and run Playwright tests
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          DASHBOARD_URL=http://localhost:3000 npm run test:e2e:playwright
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
