name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    # No branches filter — CI runs on every PR regardless of base, so a
    # stacked PR (e.g. PR 2 of the multi-user series, based on PR 1)
    # gets the same green-required gate as one targeting main directly.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  env-check:
    name: Validate Required Env Vars
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are configured
        run: |
          missing=()
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            missing+=("DATABASE_URL")
          fi
          if [ -z "${{ secrets.MONARCH_TOKEN }}" ]; then
            missing+=("MONARCH_TOKEN")
          fi
          if [ -z "${{ secrets.SYNC_API_KEY }}" ]; then
            missing+=("SYNC_API_KEY")
          fi
          if [ -z "${{ secrets.ADMIN_INITIAL_PASSWORD }}" ]; then
            missing+=("ADMIN_INITIAL_PASSWORD")
          fi
          if [ -z "${{ secrets.DEMO_USER_PASSWORD }}" ]; then
            missing+=("DEMO_USER_PASSWORD")
          fi
          if [ -z "${{ secrets.TEST_USER_PASSWORD }}" ]; then
            missing+=("TEST_USER_PASSWORD")
          fi
          if [ -z "${{ secrets.IRON_SESSION_PASSWORD }}" ]; then
            missing+=("IRON_SESSION_PASSWORD")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Configure these in GitHub repo Settings > Secrets and variables > Actions"
            echo "ADMIN_INITIAL_PASSWORD / DEMO_USER_PASSWORD / TEST_USER_PASSWORD are seeded into the users table by 'npm run db:migrate'."
            exit 1
          fi
          echo "All required env vars are configured."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  graph-ui-test-policy:
    name: Graph UI Test Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require component + desktop/mobile Playwright visual tests for graph UI changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-parse "$head^")"
          fi

          changed="$(git diff --name-only "$base" "$head")"
          echo "$changed" > changed-files.txt

          graph_changes="$(grep -Ei '(^src/.*/[^/]*(chart|graph|sparkline|trend|trends|visualization)[^/]*\.(ts|tsx|js|jsx)$)' changed-files.txt | grep -Evi '(^src/.*/__tests__/|[./][^/]+\.(test|spec)\.(ts|tsx|js|jsx)$)' || true)"

          if [ -z "$graph_changes" ]; then
            echo "No graph UI visualization source changes detected."
            exit 0
          fi

          component_tests="$(grep -Ei '(^src/.*/(__tests__/.*|[^/]+\.(test|spec))\.(ts|tsx|js|jsx)$)' changed-files.txt || true)"
          playwright_tests="$(grep -Ei '(^tests/e2e/.*\.(spec|test)\.ts$)' changed-files.txt || true)"
          graph_baselines="$(grep -Ei '(^tests/e2e/.*-snapshots/.*\.(png|jpg|jpeg|webp)$|^tests/e2e/.*(snapshot|baseline|visual).*\.(png|jpg|jpeg|webp)$)' changed-files.txt || true)"

          missing=()
          if [ -z "$component_tests" ]; then
            missing+=("component test under src/**/__tests__ or src/**/*.{test,spec}.{ts,tsx,js,jsx}")
          fi
          if [ -z "$playwright_tests" ]; then
            missing+=("two Playwright visual tests under tests/e2e/**/*.spec.ts: one desktop resolution and one iPhone/mobile resolution")
          else
            playwright_diff="$(git diff --unified=0 "$base" "$head" -- $playwright_tests || true)"
            if ! grep -Eiq '^\+.*Graph visual.*desktop' <<< "$playwright_diff"; then
              missing+=("added Playwright graph visual test for a desktop resolution")
            fi
            if ! grep -Eiq '^\+.*Graph visual.*(iPhone|mobile)' <<< "$playwright_diff"; then
              missing+=("added Playwright graph visual test for an iPhone/mobile resolution")
            fi
            if ! grep -Eiq '^\+.*toHaveScreenshot\(' <<< "$playwright_diff"; then
              missing+=("Playwright graph visual tests must use toHaveScreenshot(...) snapshot assertions")
            fi
          fi
          if [ -z "$graph_baselines" ]; then
            missing+=("committed Playwright PNG screenshot baselines for the graph visual tests")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Graph UI visualization files changed without required test coverage."
            echo "Graph UI changes detected:"
            echo "$graph_changes"
            echo
            echo "Missing:"
            printf -- '- %s\n' "${missing[@]}"
            echo
            echo "AGENTS.md requires graph/chart/sparkline/trend UI changes to include component tests plus two Playwright screenshot snapshot tests: desktop and iPhone/mobile."
            exit 1
          fi

          echo "Graph UI visualization changes include component and Playwright visual test updates."

  page-visual-baseline-policy:
    name: Page Visual Baseline Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require desktop + mobile visual baselines for page changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-parse "$head^")"
          fi

          changed="$(git diff --name-only "$base" "$head")"
          echo "$changed" > changed-files.txt

          page_changes="$(grep -Ei '(^src/app/.*/page\.(ts|tsx|js|jsx)$|^src/app/page\.(ts|tsx|js|jsx)$)' changed-files.txt || true)"

          if [ -z "$page_changes" ]; then
            echo "No page source changes detected."
            exit 0
          fi

          visual_tests="$(grep -Ei '(^tests/e2e/.*(visual|baseline).*\.(spec|test)\.ts$)' changed-files.txt || true)"
          visual_baselines="$(grep -Ei '(^tests/e2e/.*(snapshot|baseline|visual).*\.(png|jpg|jpeg|webp)$|^tests/e2e/.*-snapshots/.*\.(png|jpg|jpeg|webp)$)' changed-files.txt || true)"

          missing=()
          if [ -z "$visual_tests" ]; then
            missing+=("Playwright page visual/baseline spec under tests/e2e/**")
          fi
          if [ -z "$visual_baselines" ]; then
            missing+=("committed desktop and iPhone/mobile visual baseline image snapshots")
          fi

          if [ -n "$visual_tests" ]; then
            visual_diff="$(git diff --unified=0 "$base" "$head" -- $visual_tests || true)"
            if ! grep -Eiq '^\+.*(desktop|1440|1280)' <<< "$visual_diff"; then
              missing+=("added/updated desktop page visual baseline test")
            fi
            if ! grep -Eiq '^\+.*(iPhone|mobile|390|375)' <<< "$visual_diff"; then
              missing+=("added/updated iPhone/mobile page visual baseline test")
            fi
            if ! grep -Eiq '^\+.*toHaveScreenshot\(' <<< "$visual_diff"; then
              missing+=("page visual baseline tests must use toHaveScreenshot(...) snapshot assertions")
            fi
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Page files changed without required visual baseline coverage."
            echo "Page changes detected:"
            echo "$page_changes"
            echo
            echo "Missing:"
            printf -- '- %s\n' "${missing[@]}"
            echo
            echo "AGENTS.md requires every page to have desktop and iPhone/mobile Playwright visual baselines, and page changes must update the correct baseline snapshots."
            exit 1
          fi

          echo "Page changes include desktop and iPhone/mobile visual baseline updates."

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run database migrations (seeds users + adds owner_id)
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
          DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Unit tests (mocked)
        run: npx jest --ci --reporters=default --testPathIgnorePatterns='integration|e2e|\.claude/worktrees'
        env:
          CI: true

      - name: Integration tests (real DB, owner_id-scoped)
        run: npx jest --ci --reporters=default --testPathPattern='integration' --testPathIgnorePatterns='\.claude/worktrees'
        env:
          CI: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}

      - name: Coverage report
        if: always()
        run: npx jest --coverage --ci --reporters=default --testPathIgnorePatterns='integration|e2e|\.claude/worktrees'
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%';
              console.log('Statements:', fmt(c.statements));
              console.log('Branches:  ', fmt(c.branches));
              console.log('Functions: ', fmt(c.functions));
              console.log('Lines:     ', fmt(c.lines));
            " >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [env-check, lint, type-check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production

  # Playwright E2E: runs in a real browser against localhost
  # Validates client-side rendering on every PR and push
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build app
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
          DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Reseed user passwords from env (idempotent; fixes placeholder hashes)
        run: npm run db:reseed-users
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_INITIAL_PASSWORD: ${{ secrets.ADMIN_INITIAL_PASSWORD }}
          DEMO_USER_PASSWORD: ${{ secrets.DEMO_USER_PASSWORD }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright (local target, real DB scoped to test user)
        run: npx playwright test
        env:
          PLAYWRIGHT_TARGET: local
          CI: true
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IRON_SESSION_PASSWORD: ${{ secrets.IRON_SESSION_PASSWORD }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
