<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mission Control — Redesign explorations</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&family=Geist+Mono:wght@300;400;500;600&family=Instrument+Serif&family=Geist:wght@300;400;500;600;700&display=swap" />
<style>
  html, body { margin:0; padding:0; background:#ECEAE3; font-family:'Geist','Inter',system-ui,sans-serif; }
  /* utility resets for component bodies inside artboards */
  .ab { font-family:inherit; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .ab * { box-sizing:border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="v1-conservative.jsx"></script>
<script type="text/babel" src="v1-dark.jsx"></script>
<script type="text/babel" src="v2-bold.jsx"></script>
<script type="text/babel" src="v3-experimental.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
const { V1Desktop, V1Mobile, V1Drawer } = window;
const { V1DDesktop, V1DMobile, V1DDrawer } = window;
const { V2Desktop, V2Mobile, V2Drawer } = window;
const { V3Desktop, V3Mobile, V3Drawer } = window;

function App() {
  return (
    <DesignCanvas>
      <DCPostIt x={40} y={40} width={340}>
        <strong>Mission Control — three directions.</strong>{'\n\n'}
        Same data, same jobs (glance · log · reflect). Different physics.{'\n\n'}
        Drag artboards to reorder. Double-click to open fullscreen.
      </DCPostIt>

      <DCSection id="recommended" title="★ Conservative · Dark" subtitle="V1 layout + V3 palette — your favorite anatomy in the UV/aurora skin">
        <DCArtboard id="v1d-desktop" label="Desktop · Overview" width={1280} height={880}><V1DDesktop /></DCArtboard>
        <DCArtboard id="v1d-mobile" label="Mobile" width={390} height={844}><V1DMobile /></DCArtboard>
        <DCArtboard id="v1d-drawer" label="Reflection drawer" width={460} height={844}><V1DDrawer /></DCArtboard>
      </DCSection>

      <DCSection id="conservative" title="01 · Conservative" subtitle="Linear-clean light — the original">
        <DCArtboard id="v1-desktop" label="Desktop · Overview" width={1280} height={880}><V1Desktop /></DCArtboard>
        <DCArtboard id="v1-mobile" label="Mobile" width={390} height={844}><V1Mobile /></DCArtboard>
        <DCArtboard id="v1-drawer" label="Reflection drawer" width={460} height={844}><V1Drawer /></DCArtboard>
      </DCSection>

      <DCSection id="bold" title="02 · Bold" subtitle="Trading terminal · dense mono · operator-grade">
        <DCArtboard id="v2-desktop" label="Desktop · Console" width={1280} height={880}><V2Desktop /></DCArtboard>
        <DCArtboard id="v2-mobile" label="Mobile" width={390} height={844}><V2Mobile /></DCArtboard>
        <DCArtboard id="v2-drawer" label="Reflection drawer" width={460} height={844}><V2Drawer /></DCArtboard>
      </DCSection>

      <DCSection id="experimental" title="03 · Experimental" subtitle="Arc + Raycast · layered · keyboard-first · brand-forward">
        <DCArtboard id="v3-desktop" label="Desktop · Console" width={1280} height={880}><V3Desktop /></DCArtboard>
        <DCArtboard id="v3-mobile" label="Mobile" width={390} height={844}><V3Mobile /></DCArtboard>
        <DCArtboard id="v3-drawer" label="Reflection drawer" width={460} height={844}><V3Drawer /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
